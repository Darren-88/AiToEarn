name: Build Windows AiToEarn App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'package.json' # 指定依赖文件，跳过锁文件检查
          check-latest: true

      - name: Install Dependencies
        run: |
          npm install --force
          npm cache clean --force # 清理缓存，避免冲突
        # 新增electron镜像加速（解决云端下载慢/失败问题，不影响原有逻辑）
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Rebuild Native Modules (better-sqlite3)
        run: npm run rebuild

      - name: Build Installer
        run: npm run dist:nsis

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: AiToEarn-Setup-Win64
          # 关键修正：路径改成你electron-builder配置的release目录（原dist/installer/*.exe是错的）
          path: release/**/*.exe
