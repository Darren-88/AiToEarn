name: Build AiToEarn Windows
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          cd aitoearn-electron
          npm install
      - name: Build App
        run: |
          cd aitoearn-electron
          npm run build
      - name: Package Installer
        run: |
          cd aitoearn-electron
          npm run dist
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AiToEarn-Setup
          path: aitoearn-electron/dist/*.exe
