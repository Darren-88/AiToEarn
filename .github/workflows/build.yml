name: Build AiToEarn Windows
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build App
        run: npm run build
      - name: Package Installer
        run: npm run dist
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AiToEarn-Setup
          path: dist/*.exe
